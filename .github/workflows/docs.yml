name: docs

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Use asdf-nim instead of setup-nim-action because mkdocstrings-nim's
      # extractor does `import compiler/ast`, which only resolves when Nim is
      # installed in a layout that exposes the compiler modules. asdf-nim
      # builds Nim from source and `nimble install compiler` provides the
      # required modules on the import path.
      - name: Setup asdf
        uses: asdf-vm/actions/setup@v4

      # Cache the asdf-built Nim install to skip the slow source build on
      # every run. Bump NIM_CACHE_VERSION below (or change NIM_VERSION) to
      # force a rebuild.
      - name: Cache asdf Nim install
        id: cache-nim
        uses: actions/cache@v4
        with:
          path: |
            ~/.asdf/installs/nim
            ~/.asdf/plugins/nim
            ~/.asdf/shims
          key: ${{ runner.os }}-asdf-nim-2.2.10-v1

      - name: Install asdf-nim plugin
        if: steps.cache-nim.outputs.cache-hit != 'true'
        run: asdf plugin add nim https://github.com/asdf-community/asdf-nim.git

      - name: Install Nim
        run: |
          if [[ "${{ steps.cache-nim.outputs.cache-hit }}" != "true" ]]; then
            asdf install nim 2.2.10
          fi
          asdf set nim 2.2.10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Cache the Nimble package store. asdf-nim sets NIMBLE_DIR under the
      # asdf install root, so cache that path (not ~/.nimble).
      - name: Cache Nimble packages
        uses: actions/cache@v4
        with:
          path: ~/.asdf/installs/nim/2.2.10/nimble
          key: ${{ runner.os }}-nim-2.2.10-nimble-compiler-v1

      - name: Install compiler modules
        # Run from /tmp so nimble does NOT enter project-lockfile mode (which
        # would install the project's deps instead of the `compiler` package).
        run: |
          cd /tmp
          nimble install compiler -y

      - name: Install Python dependencies
        run: pip install -r docs-requirements.txt

      - name: Create directories for watch config
        run: |
          mkdir -p docs/api
          mkdir -p docs/guide

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch gh-pages
        run: |
          git fetch origin gh-pages --depth=1 || true

      - name: Deploy docs (versioned)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mike deploy --push --update-aliases $VERSION latest
          mike set-default --push latest

      - name: Deploy docs (dev)
        if: github.ref == 'refs/heads/main'
        run: |
          mike deploy --push dev
