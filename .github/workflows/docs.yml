name: docs

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Cache Nimble packages
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: ${{ runner.os }}-nimble-docs-${{ hashFiles('*.nimble') }}
          restore-keys: |
            ${{ runner.os }}-nimble-docs-

      - name: Install Nim compiler source
        run: |
          # mkdocstrings-nim needs the `compiler/` package (Nim compiler
          # source), which is separate from the `nim` binary installed by
          # setup-nim-action. `nimble path nim` reports success based on the
          # binary, so check for the compiler source file directly.
          if ! nim_pkg_dir="$(nimble path nim 2>/dev/null)" || [[ ! -f "$nim_pkg_dir/compiler/ast.nim" ]]; then
            nimble install nim -y
          else
            echo "Nim compiler source already installed at $nim_pkg_dir (from cache)"
          fi

      - name: Install Python dependencies
        run: pip install -r docs-requirements.txt

      - name: Create directories for watch config
        run: |
          mkdir -p docs/api
          mkdir -p docs/guide

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch gh-pages
        run: |
          git fetch origin gh-pages --depth=1 || true

      - name: Deploy docs (versioned)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mike deploy --push --update-aliases $VERSION latest
          mike set-default --push latest

      - name: Deploy docs (dev)
        if: github.ref == 'refs/heads/main'
        run: |
          mike deploy --push dev
