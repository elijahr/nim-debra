name: ci

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Install nph
        run: nimble install -y nph

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Install typestates
        run: nimble install -y "typestates@>= 0.10.0"

      - name: Typestates verify
        run: typestates verify -W --format=github src/

  test:
    name: test (${{ matrix.nim-version }} / ${{ matrix.runs-on }} / ${{ matrix.mm }} / ${{ matrix.backend }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        # v0.10.0 DWCAS matrix (design §7.1) + MSVC: 4 OS × 4 MM × 2 backend = 32 cells.
        # - ubuntu-24.04         : pinned over ubuntu-latest for reproducibility (x86_64 cmpxchg16b cell)
        # - ubuntu-24.04-arm     : Graviton2-class aarch64 runner (LSE casp[al] cell)
        # - macos-15             : current GA Apple Silicon image; chosen over macos-14 (deprecation 2026-07-06)
        # - windows-2022         : MSVC/vcc cell exercising _InterlockedCompareExchange128 + _Interlocked* family
        # macOS x86_64 has no CI coverage in v0.10.0 (see §7.1 / §14 m4).
        runs-on: [ubuntu-24.04, ubuntu-24.04-arm, macos-15, windows-2022]
        nim-version: ['stable']
        mm: [arc, orc, refc, atomicArc]
        backend: [c, cpp]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nim ${{ matrix.nim-version }}
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim-version }}

      - name: Cache Nimble packages
        # Cache key is bound to *.nimble so any dep change forces a fresh
        # install. We deliberately do NOT use restore-keys: a partial-match
        # restore brings in stale ~/.nimble/pkgs2 source clones, and nimble
        # then resolves against the cached clone's tag set rather than
        # re-fetching upstream — so newly-published dep versions are
        # invisible. Full miss + fresh install is the correct behavior.
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: ${{ matrix.runs-on }}-nimble-${{ matrix.nim-version }}-${{ hashFiles('*.nimble') }}

      - name: DWCAS macro probe (gates downstream cells)
        # Probe compiles a C fixture with __GCC_HAVE_SYNC_COMPARE_AND_SWAP_16
        # macro inspection. MSVC does not provide that macro family
        # (_InterlockedCompareExchange128 is gated at the Nim level via the
        # vcc arm in dwcasGate3Assert), so the probe is meaningless on
        # windows-2022 and we skip it there.
        if: matrix.runs-on != 'windows-2022'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/dwcas-probe

          # Pick compiler + flags per runner (design §5.2.5).
          case "${{ matrix.runs-on }}" in
            ubuntu-24.04)        CC=gcc;     CFLAGS="-mcx16";                                       SUFFIX="ubuntu-24.04.gcc" ;;
            ubuntu-24.04-arm)    CC=gcc;     CFLAGS="-march=armv8.1-a+lse -mno-outline-atomics";    SUFFIX="ubuntu-24.04-arm" ;;
            macos-15)            CC=clang;   CFLAGS="";                                             SUFFIX="macos-15" ;;
            *)                   echo "::error::unknown runner ${{ matrix.runs-on }}"; exit 1 ;;
          esac

          # Compile + run the probe.
          "$CC" $CFLAGS tests/probes/dwcas_macro_probe.c -o /tmp/dwcas-probe/probe
          /tmp/dwcas-probe/probe | tee /tmp/dwcas-probe/actual.txt

          # Compare against the golden file (per-runner expected output).
          EXPECTED="tests/probes/dwcas_macro_probe.expected.${SUFFIX}"
          if [[ ! -f "$EXPECTED" ]]; then
            echo "::error::missing golden file $EXPECTED"
            exit 1
          fi
          diff -u "$EXPECTED" /tmp/dwcas-probe/actual.txt

      - name: Install dependencies
        run: nimble install -y

      - name: Select MSVC/vcc on Windows (CI-only)
        # nim.cfg deliberately leaves Windows compiler selection unset so
        # local MinGW-GCC users on Windows are not forced to install MSVC.
        # CI exercises the `_InterlockedCompareExchange128` / `_Interlocked*`
        # arms in debra/atomics by appending `cc = "vcc"` to nim.cfg here,
        # which is picked up by every `nim c` invocation — including the
        # `exec "nim c -r ..."` calls inside Nimble's `test` task, where
        # `--passNim:--cc:vcc` does NOT propagate. Mirrors the cc=vcc
        # directive that previously lived in the checked-in nim.cfg.
        if: matrix.runs-on == 'windows-2022'
        shell: bash
        run: |
          set -euo pipefail
          printf '\n@if windows:\n  cc = "vcc"\n@end\n' >> nim.cfg
          echo "----- nim.cfg after vcc append -----"
          cat nim.cfg

      - name: Clear compilation cache
        shell: bash
        run: rm -rf ~/.cache/nim

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          # Workaround for nimble v0.20.x: `nimble <task>` exits 0 even when
          # an inner `exec` aborts the script (it logs `Error:` but does not
          # propagate the failure). Tee output and grep for nimble's error
          # markers to force a non-zero exit.
          nimble_run() {
            local logfile
            logfile="$(mktemp)"
            "$@" 2>&1 | tee "$logfile"
            local rc=${PIPESTATUS[0]}
            if [[ $rc -ne 0 ]]; then
              return $rc
            fi
            if grep -Eq '^[[:space:]]*Error:' "$logfile"; then
              echo "::error::nimble reported an error but exited 0; failing the step."
              return 1
            fi
          }
          # Note: vcc selection on windows-2022 is handled by the
          # "Select MSVC/vcc on Windows (CI-only)" step above, which
          # appends `@if windows: cc = "vcc" @end` to nim.cfg at runtime.
          # We do NOT plumb `--passNim:--cc:vcc` through this matrix step
          # because Nimble's `test` task does its own `exec "nim c -r ..."`
          # loop internally, and `--passNim` flags do not propagate into
          # those nested `exec` invocations — only nim.cfg does.
          nimble_run nimble test --passNim:--mm:${{ matrix.mm }} --passNim:--backend:${{ matrix.backend }}

      - name: objdump regex verification
        # Only run once per runner (not per mm/backend axis) — the emit
        # is fixed by the compiler + flags, not by --mm or --backend.
        # Skipped on windows-2022: MSVC's `dumpbin /disasm` produces a
        # different format, and the gcc/clang mnemonic checks (`cmpxchg16b`,
        # `caspal`, `ldaxp`/`stlxp`) are backend-specific. The vcc DWCAS
        # path is exercised end-to-end by the test suite itself, which is
        # sufficient at this width.
        #
        # ---- libatomic-fallback regression gate ----
        # Beyond positive mnemonic checks, this step is a release-blocking
        # gate that fails the build if any compiled binary contains a call
        # (bl) or tail-call (b) to a libatomic symbol from the family:
        #   __atomic_load_16, __atomic_store_16, __atomic_exchange_16,
        #   __atomic_compare_exchange_16, __aarch64_cas16_*
        #
        # Why: GCC's generic `__atomic_*_n` builtins at width 16 silently
        # lower to libatomic libcalls instead of inlining the appropriate
        # DWCAS instruction (cmpxchg16b / caspal / ldaxp+stlxp). Our codebase
        # uses the legacy `__sync_*` builtins on GCC paths specifically to
        # avoid this footgun — see atomic128 reference and PR #14 cycle-12
        # history (linker error when __atomic_*_n libcalls landed). Empirical
        # probe in PR #14 (commit ac4e24f) confirmed gcc-aarch64 emits
        # `b __atomic_load_16` (TAIL call), so the regex must catch both
        # `bl <sym>` (call) and `b <sym>` (tail call) forms.
        #
        # Both /tmp/fixture (the DWCAS objdump probe) AND a real test binary
        # built from tests/test_dwcas_roundtrip.nim are checked, so any
        # accidental __atomic_*_n use anywhere in the DWCAS surface — not
        # just the fixture — is caught.
        #
        # DO NOT bypass this gate without operator approval.
        if: matrix.mm == 'arc' && matrix.backend == 'c' && matrix.runs-on != 'windows-2022'
        shell: bash
        run: |
          set -euo pipefail
          nim c -d:release --passC:-fno-lto -o:/tmp/fixture tests/probes/dwcas_objdump_fixture.nim
          # Materialize objdump output to a file to avoid SIGPIPE pipefail
          # interaction with `grep -q` (which exits early on first match).
          objdump -d /tmp/fixture > /tmp/fixture.disasm

          # Shared libatomic-fallback guard: catches both `bl <sym>` (call)
          # and `b <sym>` (tail call) to any of the __atomic_*_16 or
          # __aarch64_cas16_* libcalls. Applied to every disasm we generate.
          libatomic_regex='(^|[[:space:]])b[l]?[[:space:]]+(<)?(__atomic_(load|store|exchange|compare_exchange)_16|__aarch64_cas16_)'
          check_libatomic() {
            local disasm="$1"
            local label="$2"
            if grep -qE "$libatomic_regex" "$disasm"; then
              echo "::error::libatomic-fallback symbol detected in $label — DWCAS dispatched to libatomic instead of inlining"
              echo "::error::See atomic128 reference; PR #14 cycle-12 history; KEEP __sync_* on GCC paths"
              echo "::group::Offending symbols ($label)"
              grep -E '__atomic_(load|store|exchange|compare_exchange)_16|__aarch64_cas16_' "$disasm" | head -20
              echo "::endgroup::"
              return 1
            fi
            return 0
          }

          case "${{ matrix.runs-on }}" in
            ubuntu-24.04)
              if ! grep -qF 'cmpxchg16b' /tmp/fixture.disasm; then
                echo "::error::expected cmpxchg16b mnemonic missing"
                exit 1
              fi
              check_libatomic /tmp/fixture.disasm "fixture (x86_64)" || exit 1
              echo "objdump verification PASSED: cmpxchg16b mnemonic found"
              ;;
            ubuntu-24.04-arm|macos-15)
              check_libatomic /tmp/fixture.disasm "fixture (aarch64)" || exit 1
              if grep -qF 'caspal' /tmp/fixture.disasm; then
                echo "objdump verification PASSED: caspal mnemonic found"
              elif grep -qF 'casp' /tmp/fixture.disasm; then
                echo "objdump verification PASSED: casp* (LSE) mnemonic found"
              elif grep -A 5 'ldaxp' /tmp/fixture.disasm | grep -q 'stlxp'; then
                echo "objdump verification PASSED: ldaxp/stlxp LL/SC pair found"
              else
                echo "::group::objdump output for diagnosis"
                grep -iE 'cas|ldax|stlx|atomic|__int128' /tmp/fixture.disasm | head -30
                echo "::endgroup::"
                echo "::error::expected casp(al) or ldaxp/stlxp pair missing"
                exit 1
              fi
              ;;
          esac

          # Real-test-binary regression check: build the most surface-covering
          # DWCAS test (exercises load/store/exchange/CAS at 16 bytes) and run
          # the same libatomic-fallback guard. This catches any accidental
          # __atomic_*_n introduction outside the fixture itself.
          nim c -d:release --passC:-fno-lto -o:/tmp/test_dwcas_bin --path:src tests/test_dwcas_roundtrip.nim
          objdump -d /tmp/test_dwcas_bin > /tmp/test_dwcas_bin.disasm
          check_libatomic /tmp/test_dwcas_bin.disasm "test_dwcas_roundtrip binary" || exit 1
          echo "libatomic-fallback regression check PASSED (fixture + test binary clean)"
          # Counter-test: same fixture compiled with -mno-cx16 MUST fail compile
          # (gate 3's _Static_assert fires under -mno-cx16). Only meaningful on
          # x86_64 — -mno-cx16 is a noop on aarch64.
          if [[ "${{ matrix.runs-on }}" == "ubuntu-24.04" ]]; then
            if nim c -d:release --passC:-mno-cx16 --passC:-fno-lto -o:/tmp/fixture-neg \
                 tests/probes/dwcas_objdump_fixture.nim 2>/dev/null; then
              echo "::error::counter-test should have failed compile (gate 3 not firing under -mno-cx16)"
              exit 1
            fi
            echo "counter-test PASSED: compile correctly failed under -mno-cx16"
          fi

      - name: TSAN DWCAS contention (ubuntu-24.04 only, design §7.3)
        # Branch A: zero unsuppressed races attributable to DWCAS frames.
        # Branch B tripwire: > 5 suppressions in tests/tsan.supp halts impl.
        # Branch C: operator-approved fallback documented in CHANGELOG.
        if: matrix.runs-on == 'ubuntu-24.04' && matrix.mm == 'arc' && matrix.backend == 'c'
        env:
          TSAN_OPTIONS: "suppressions=tests/tsan.supp"
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f tests/test_dwcas_contention.nim ]]; then
            echo "::warning::tests/test_dwcas_contention.nim not yet present (Task 14); skipping TSAN cell"
            exit 0
          fi
          nim c --threads:on -d:useMalloc \
            --passC:-fsanitize=thread --passL:-fsanitize=thread \
            -r tests/test_dwcas_contention.nim

      - name: Test examples
        shell: bash
        env:
          # KNOWN_GAP (v0.10.0): on windows-2022 / orc / c the
          # `reclamation_background` example finishes cleanly but SIGSEGVs at
          # process teardown inside Nim's `alloc.nim:addToSharedFreeList` (orc
          # shared-free-list shutdown race). The example passes on all other 32
          # matrix cells (3 OSes x 4 MMs x 2 backends + Windows arc/refc/
          # atomicArc/orc-cpp). Skip just this one example on the affected cell
          # rather than the whole `testExamples` step. v0.10.1 follow-up will
          # investigate the orc shutdown interaction.
          DEBRA_SKIP_EXAMPLE_RECLAMATION_BACKGROUND: ${{ (matrix.runs-on == 'windows-2022' && matrix.mm == 'orc' && matrix.backend == 'c') && '1' || '' }}
        run: |
          set -o pipefail
          nimble_run() {
            local logfile
            logfile="$(mktemp)"
            "$@" 2>&1 | tee "$logfile"
            local rc=${PIPESTATUS[0]}
            if [[ $rc -ne 0 ]]; then
              return $rc
            fi
            if grep -Eq '^[[:space:]]*Error:' "$logfile"; then
              echo "::error::nimble reported an error but exited 0; failing the step."
              return 1
            fi
          }
          nimble_run nimble testExamples

  test-macos-x86_64-rosetta:
    # Restores macOS x86_64 CI coverage retired by GitHub's 2025-12-08
    # macos-13 sunset. Apple Silicon macos-15 runners ship Apple Clang
    # (capable of cross-compiling to x86_64 via `-arch x86_64`) and
    # Rosetta 2 (capable of executing x86_64 Mach-O binaries on arm64
    # hardware). Combining the two gives REAL macOS x86_64 test
    # coverage: a real x86_64 binary that actually executes the DEBRA+
    # surface, including the inlined cmpxchg16b DWCAS path.
    #
    # Why a separate job (not a matrix axis): coverage at this width is
    # 4 MM × 2 backend = 8 cells, parallel-independent of the main 32-cell
    # matrix. Folding into the existing matrix would either explode it to
    # 64 cells or require skip-conditionals on every step.
    name: test (macos-15-rosetta / x86_64 / ${{ matrix.mm }} / ${{ matrix.backend }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        nim-version: ['stable']
        mm: [arc, orc, refc, atomicArc]
        backend: [c, cpp]
    env:
      # Apple Clang cross-compile flags for x86_64-apple-darwin.
      # Mirrors what nim.cfg would emit for `--cpu:amd64` but injected
      # through --passC / --passL because we are crossing on a macos
      # host where Nim's default native config still targets arm64.
      MACOS_X86_64_NIMFLAGS: '--cpu:amd64 --passC:-arch --passC:x86_64 --passL:-arch --passL:x86_64'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nim ${{ matrix.nim-version }}
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim-version }}

      - name: Cache Nimble packages
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: macos-15-rosetta-nimble-${{ matrix.nim-version }}-${{ hashFiles('*.nimble') }}

      - name: Verify Rosetta 2 available
        shell: bash
        run: |
          set -euo pipefail
          # macos-15 GitHub-hosted runners ship Rosetta 2 preinstalled.
          # Probe by exec'ing an x86_64 shell builtin under `arch`.
          arch -x86_64 uname -m | tee /tmp/rosetta-uname
          if ! grep -qx 'x86_64' /tmp/rosetta-uname; then
            echo "::error::Rosetta 2 not available on this runner — arch -x86_64 uname -m did not print x86_64"
            exit 1
          fi

      - name: Install dependencies
        run: nimble install -y

      - name: Clear compilation cache
        shell: bash
        run: rm -rf ~/.cache/nim

      - name: Build + run tests (x86_64 cross-compile, Rosetta 2 execute)
        shell: bash
        run: |
          set -euo pipefail
          # We bypass `nimble test` here: that task hardcodes a 4-MM × 2-backend
          # internal loop, and we want exactly one matrix-driven (mm, backend)
          # invocation per GitHub Actions cell so failures point at the right cell.
          BACKEND_CMD=c
          if [[ "${{ matrix.backend }}" == "cpp" ]]; then
            BACKEND_CMD=cpp
          fi
          nim $BACKEND_CMD -r --mm:${{ matrix.mm }} --threads:on --path:src -d:testing \
            ${MACOS_X86_64_NIMFLAGS} \
            tests/test.nim

      - name: objdump verification (macos x86_64 cmpxchg16b emit)
        # Mirror the main job's objdump regression gate but for the
        # macOS x86_64 cross-compile. We use `otool -tV` (the macOS-native
        # disassembler) since `objdump` is not in the default PATH on
        # macos-15. Only runs on the arc/c cell to avoid redundant work —
        # the emit is fixed by the compiler + flags, not by --mm or --backend.
        if: matrix.mm == 'arc' && matrix.backend == 'c'
        shell: bash
        run: |
          set -euo pipefail
          nim c -d:release --passC:-fno-lto \
            ${MACOS_X86_64_NIMFLAGS} \
            -o:/tmp/fixture-macos-x86 tests/probes/dwcas_objdump_fixture.nim
          file /tmp/fixture-macos-x86 | tee /tmp/fixture-file.txt
          if ! grep -qF 'Mach-O 64-bit executable x86_64' /tmp/fixture-file.txt; then
            echo "::error::cross-compile did not produce a Mach-O x86_64 binary"
            exit 1
          fi
          otool -tV /tmp/fixture-macos-x86 > /tmp/fixture-macos-x86.disasm
          if ! grep -qF 'cmpxchg16b' /tmp/fixture-macos-x86.disasm; then
            echo "::group::otool output for diagnosis"
            grep -iE 'cmpxchg|atomic|cas' /tmp/fixture-macos-x86.disasm | head -30
            echo "::endgroup::"
            echo "::error::expected cmpxchg16b mnemonic missing in macOS x86_64 cross-compile"
            exit 1
          fi
          echo "otool verification PASSED: cmpxchg16b mnemonic found in macOS x86_64 binary"

          # Same libatomic-fallback guard as the linux/macos-arm64 cells.
          # Apple Clang on x86_64-apple-darwin should NOT route DWCAS
          # through libatomic — it should inline cmpxchg16b directly.
          libatomic_regex='__atomic_(load|store|exchange|compare_exchange)_16'
          if grep -qE "$libatomic_regex" /tmp/fixture-macos-x86.disasm; then
            echo "::error::libatomic-fallback symbol detected in macOS x86_64 fixture"
            echo "::group::Offending symbols"
            grep -E "$libatomic_regex" /tmp/fixture-macos-x86.disasm | head -10
            echo "::endgroup::"
            exit 1
          fi
          echo "libatomic-fallback regression check PASSED (macOS x86_64 fixture clean)"
