# v0.10.0 Windows compiler selection: nim.cfg intentionally does NOT
# pin a compiler on Windows. MinGW-GCC users get the default
# `setup-nim-action` toolchain (with `-mcx16` applied via the gcc
# branch below). CI selects MSVC/vcc via a runner-local append to
# nim.cfg in `.github/workflows/ci.yml` so the
# `_InterlockedCompareExchange128` / `_Interlocked*` arms in
# debra/atomics are exercised on every push without forcing MSVC
# on local Windows developers (who often only have MinGW installed).

# -mcx16 / LSE flags are gcc/clang-only; we guard on `not vcc` so any
# Windows path that does NOT select vcc (the default for local MinGW
# users, plus anyone passing `--cc:gcc` explicitly) still receives the
# required flag. MSVC rejects `-mcx16` with `D9002`, so the `not vcc`
# predicate keeps it off the MSVC command line while letting gcc/clang
# on any platform (including MinGW on Windows) get it.
@if (amd64 or x86_64) and (gcc or clang) and not vcc:
  passC = "-mcx16"
@elif arm64 and gcc and not vcc:
  # gcc on arm64 needs both: -march for LSE atomics opcodes, and
  # -mno-outline-atomics to inline the LSE ops instead of routing
  # through libgcc's runtime-dispatch helpers (which on some toolchains
  # serialize 16-byte CAS through a lock).
  passC = "-march=armv8.1-a+lse -mno-outline-atomics"
@elif arm64 and clang and not vcc:
  # clang on arm64 (Linux distro clang AND Apple Clang on macOS) needs
  # -march=armv8.1-a+lse to emit the LSE atomic instructions debra's
  # CAS lowerings target. -mno-outline-atomics is intentionally omitted:
  # it is a gcc-specific flag (clang does not implement outline-atomics
  # dispatch the same way) and passing it through `passC` on some clang
  # versions errors out instead of being silently accepted. Apple
  # Clang on M1+ already targets ARMv8.4 by default, so the -march
  # flag is a no-op there but harmless; on Linux arm64 with clang it
  # is load-bearing for LSE codegen.
  passC = "-march=armv8.1-a+lse"
@end
