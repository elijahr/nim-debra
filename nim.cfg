# v0.10.0 MSVC support: default Windows builds to vcc (MSVC) so
# debra/atomics's `_Interlocked*` / `_InterlockedCompareExchange128`
# arms are exercised. The MinGW gcc that ships with `setup-nim-action`
# is rejected because debra/atomics's vcc-specific intrinsics are
# unavailable through MinGW's <intrin.h>-equivalent. Users who want
# the MinGW path can pass `--cc:gcc` explicitly to override this.
@if windows:
  cc = "vcc"
@end

# -mcx16 / LSE flags are gcc/clang-only; explicit `not windows` guard
# avoids the flag being appended on Windows where nim.cfg above forces
# cc=vcc. (MSVC rejects `-mcx16` with `D9002` and the gcc/clang predicates
# in nim.cfg are evaluated against the *default* cc, not the cc set
# earlier in this file.)
@if not windows:
  @if (amd64 or x86_64) and (gcc or clang):
    passC = "-mcx16"
  @elif arm64 and gcc:
    passC = "-march=armv8.1-a+lse -mno-outline-atomics"
  @end
@end
